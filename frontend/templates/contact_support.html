{% extends "base.html" %}

{% block title %}Contact Support - Secure Healthcare Crypto System{% endblock %}
{% block topbar_title %}Contact Support{% endblock %}

{% block content %}
<a href="{{ url_for('help_page') }}" class="back-link">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
    Back to Help
</a>

<div class="page-header">
    <h2>Contact Support</h2>
    <p>Send us a message and we'll get back to you shortly.</p>
</div>

<div class="card" style="max-width: 640px;">
    <h3 class="card-title">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
        Send a Message
    </h3>
    <form method="POST">
        <div class="form-group">
            <label>Your Name</label>
            <input type="text" name="name" placeholder="Enter your name" required class="form-input">
        </div>
        <div class="form-group">
            <label>Email Address</label>
            <input type="email" name="email" placeholder="Enter your email" required class="form-input">
        </div>
        <div class="form-group">
            <label>Subject</label>
            <input type="text" name="subject" placeholder="Enter subject" required class="form-input">
        </div>
        <div class="form-group">
            <label>Message</label>
            <textarea name="message" placeholder="Describe your issue..." required class="form-textarea"></textarea>
        </div>
        <button type="submit" class="btn btn-primary btn-full">Send Message</button>
    </form>
</div>
{% endblock %}
